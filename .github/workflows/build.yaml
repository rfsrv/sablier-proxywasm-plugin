name: Build and push wasm OCI image

on:
  workflow_dispatch:
    inputs:
      upstream_version:
        description: "Upstream sablier-proxywasm-plugin version (e.g. v1.1.0)"
        required: true
        type: string
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rfsrv/sablier-proxywasm-plugin

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write       # for attestation
      attestations: write   # for attest-build-provenance

    steps:
      - name: Resolve upstream version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.upstream_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (for Dockerfile)
        uses: actions/checkout@v4

      - name: Download upstream wasm binary
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          curl -fsSL \
            "https://github.com/sablierapp/sablier-proxywasm-plugin/releases/download/${VERSION}/sablier-proxywasm-plugin.wasm" \
            -o plugin.wasm
          echo "Downloaded plugin.wasm ($(wc -c < plugin.wasm) bytes)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Attest image
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
